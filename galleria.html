<!DOCTYPE html>
<html lang="it">

<body data-page="galleria" class="page-inner">

    <div class="container page-links section" style="padding-top:0">
      <a href="prenota.html" class="btn btn--hot">Prenota il tuo look</a>
      <a href="servizi.html" class="btn btn--outline-dark">Vedi servizi</a>

    <button class="lightbox__x" id="lbClose" aria-label="Chiudi">&times;</button>
    <button class="lightbox__arrow lightbox__arrow--prev" id="lbPrev">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lightbox__arrow lightbox__arrow--next" id="lbNext">›</button>
  </div>

  <footer class="footer" id="footer"></footer>
  <script src="layout.js"></script>
  <script src="script.js"></script>
  <script>initSiteLayout('galleria', { breadcrumb: 'Galleria' });</script>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAÎTRES Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-app">
  <aside class="sidebar">
    <div class="sidebar__brand">M A Î T R E S<br><small>Admin</small></div>
    <nav class="sidebar__nav">
      <button data-view="dashboard" class="active">📊 Dashboard</button>
      <button data-view="agenda">📅 Agenda</button>
      <button data-view="appointments">📋 Appuntamenti</button>
      <button data-view="new">➕ Nuovo</button>
      <button data-view="blocks">🚫 Blocchi</button>
      <button data-view="orders">🛍 Ordini</button>
      <button data-view="clients">👥 Clienti</button>
      <button data-view="staff">✂️ Staff</button>
    </nav>
    <div class="sidebar__foot">
      <button type="button" id="fullscreenBtn" class="btn-ghost btn-fs" aria-pressed="false" title="Schermo intero">
        <svg class="fs-icon fs-icon--expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M16 21h3a2 2 0 002-2v-3"/></svg>
        <svg class="fs-icon fs-icon--shrink" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg>
        Schermo intero
      </button>
      <button id="refreshBtn" class="btn-ghost">↻ Aggiorna</button>
      <button id="logoutBtn" class="btn-ghost">Esci</button>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
  <script src="js/api.js"></script>
  <script src="js/fullscreen.js"></script>
  <script src="js/admin.js"></script>
  <script>initFullscreen('fullscreenBtn');</script>
</body>
</html>
